<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Histórico</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">
    
    <header class="bg-gray-900 text-white px-6 py-4 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold">Painel IPTables</h1>
        <div class="flex items-center gap-4">
            <!-- O js pega esse span e atualiza com o nome do usuário -->
            <span class="text-sm text-gray-300">Aqui entra o nome do usuário pelo js</span>
                        <!-- tem uma  -->
            <button id="btn-logout" class="text-gray-400 hover:text-white text-sm font-medium transition-colors">Sair</button>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto p-6 flex-1">
        <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
            <h2 class="text-2xl font-semibold text-gray-700">Seu Histórico de Configurações</h2>
            <a href="chat.html" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition-colors shadow">
                + Nova conversa
            </a>
        </div>
        <!-- esse id é o q vai fazer o JS indentificar qual é a div certa -->
        <div id="history-list" class="flex flex-col gap-3">
            <!-- O JavaScript vai injetar o histórico aqui -->
            <p class="text-gray-500 italic">Carregando histórico...</p>
        </div>
    </main>

    <script src="js/dashboard.js"></script>
</body>
</html>
