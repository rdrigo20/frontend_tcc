<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Gerador IPTables</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen text-gray-800 p-4">
    
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold">Criar Nova Conta</h2>
            <p class="text-gray-500 text-sm mt-1">Preencha os dados abaixo para se cadastrar.</p>
        </div>
        
        <form id="form-cadastro" class="flex flex-col gap-4">
            
            <div>
                <label for="nome" class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
                <input type="text" id="nome" placeholder="Ex: João" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div>
                <label for="cpf" class="block text-sm font-medium text-gray-700 mb-1">CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div class="flex flex-col sm:flex-row gap-4">
                <div class="w-full">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="w-full">
                    <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirmar Senha</label>
                    <input type="password" id="confirm_password" placeholder="••••••••" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <label class="flex items-center gap-3 mt-2 text-gray-700 cursor-pointer">
                <input type="checkbox" id="professor" class="w-5 h-5 text-blue-500 rounded border-gray-300 focus:ring-blue-500"> 
                <span class="font-medium">Sou Professor</span>
            </label>
            
            <button type="submit" id="btn-submit" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition-colors mt-4">
                Cadastrar
            </button>
        </form>

        <p id="cadastro-msg" class="text-sm mt-4 text-center hidden"></p>

        <div class="mt-6 text-center border-t pt-4">
            <p class="text-sm text-gray-600">
                Já tem uma conta? 
                <a href="login.html" class="text-blue-500 hover:text-blue-700 font-medium transition-colors">Faça login aqui</a>
            </p>
        </div>
    </div>

    <script src="js/cadastro.js"></script>
</body>
</html>
