<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IPTables</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h2>Configurador de Rede</h2>
        </header>

        <main id="chat-messages" class="chat-messages">
            <div class="message received">
                Olá! Sou o assistente de firewall. Como posso ajudar na sua rede hoje?
            </div>
        </main>

        <footer class="chat-input-area">
            <input type="text" id="user-input" placeholder="Digite sua resposta...">
            <button id="btn-enviar">Enviar</button>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
