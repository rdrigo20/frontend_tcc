<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat de Configuração - IPTables</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">
    
    <header class="bg-gray-900 text-white px-6 py-4 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold">Assistente de Rede</h1>
        <a href="dashboard.html" class="text-gray-400 hover:text-white text-sm font-medium transition-colors">
            &larr; Voltar ao Painel
        </a>
    </header>

    <main class="w-full max-w-3xl mx-auto p-4 flex-1 flex flex-col">
        <!-- Container do Chat -->
        <div class="bg-white border border-gray-200 rounded-lg shadow-sm flex flex-col h-[75vh]">
            
            <!-- Área onde as mensagens aparecem (Scroll) -->
            <div id="chat-messages" class="flex-1 p-4 overflow-y-auto flex flex-col gap-4 bg-gray-50">
                <!-- Mensagem inicial de carregamento -->
                <div class="flex justify-start">
                    <div class="bg-gray-200 text-gray-800 rounded-br-lg rounded-tr-lg rounded-tl-lg px-4 py-2 max-w-[80%]">
                        <span class="italic text-sm">Conectando ao assistente...</span>
                    </div>
                </div>
            </div>

            <!-- Área de Digitação -->
            <div class="p-4 bg-white border-t border-gray-200 flex gap-2">
                <input type="text" id="user-input" placeholder="Digite sua resposta..." disabled
                       class="flex-1 px-4 py-3 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100">
                
                <button id="btn-enviar" disabled
                        class="bg-blue-500 hover:bg-blue-600 disabled:bg-blue-300 text-white font-bold py-3 px-6 rounded-full transition-colors shadow">
                    Enviar
                </button>
            </div>
        </div>
    </main>

    <script src="js/chat.js"></script>
</body>
</html>
