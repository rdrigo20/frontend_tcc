<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gerador IPTables</title>
    <!-- Carrega o Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen text-gray-800">
    
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm text-center">
        <h2 class="text-2xl font-bold mb-2">Acesso ao Sistema</h2>
        <p class="text-gray-500 mb-6">Faça login para gerenciar suas redes.</p>
        
        <form id="form-login" class="flex flex-col gap-4">
            <input type="text" id="username" placeholder="Usuário" required 
                   class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <input type="password" id="password" placeholder="Senha" required 
                   class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition-colors mt-2">Entrar</button>
            <a href="cadastro.html" class="text-blue-500 hover:underline text-sm mt-2">Criar nova conta</a>
        </form>
        <p id="login-msg" class="text-red-500 text-sm mt-4"></p>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
